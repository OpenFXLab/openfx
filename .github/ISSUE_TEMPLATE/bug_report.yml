name: Bug Report
description: Report a bug or unexpected behavior in OpenFXLab.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible so the issue can be reproduced and investigated.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this bug affect?
      options:
        - Backend / API
        - Frontend / web interface
        - Data ingestion / pipeline
        - Data quality / displayed values
        - Documentation
        - Infrastructure / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details (browser, OS, Python version, Node version, etc.)
      placeholder: |
        - OS:
        - Browser (if frontend):
        - Python version (if backend):
        - Node version (if frontend):

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other relevant information, logs, or screenshots.
